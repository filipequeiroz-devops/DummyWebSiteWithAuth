<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signup Page</title>
</head>
<body>
    <h2>Create your Account</h2>
        <p>Fill in the fields below to register for Informática Solidária.</p>

        <input type="email" id="email" placeholder="Enter your best email">
        <input type="password" id="password" placeholder="Choose a strong password">

        <p style="font-size: 0.8em; color: #666;">
            * Password must be at least 8 characters long and include numbers.
        </p>

    <button id="btnSignup" onclick="signup()">Create Account</button>
    <div id="statusMessage" style="margin-top: 20px; font-weight: bold;"></div>

    <script>
        async function signup() {
            const emailField = document.getElementById('email');
            const passwordField = document.getElementById('password');
            const statusDiv = document.getElementById('statusMessage');
            const btn = document.getElementById('btnSignup');

            const email = emailField.value;
            const password = passwordField.value;
            const API_URL = "https://2h1wm5fwje.execute-api.us-east-1.amazonaws.com/production/signup";
            
            // Visual feedback for user
            statusDiv.innerText = "Processing signup...";
            statusDiv.style.color = "blue";
            btn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ email, password }),
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const result = await response.json();

                if (response.ok) {
                    statusDiv.innerText = "✅ Success! User recorded in Cognito.";
                    statusDiv.style.color = "green";
                    
                    // SRE flow: Redirecting to confirmation page with email parameter
                    setTimeout(() => {
                        window.location.href = `confirm.html?email=${encodeURIComponent(email)}`;
                    }, 2000);

                } else {
                    statusDiv.innerText = "❌ Signup error: " + (result.error || "Verify your data.");
                    statusDiv.style.color = "red";
                }
            } catch (err) {
                statusDiv.innerText = "❌ API connection error.";
                statusDiv.style.color = "red";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
