<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restricted Area - Informática Solidária</title>
</head>
<body>
    <h2>Welcome to the Protected Area</h2>
    
    <div id="app-container">
        <div id="conteudo" style="padding: 20px; border: 1px solid #ccc; background-color: #f9f9f9; width: fit-content;">
            <p>Loading secure data...</p>
        </div>
    </div>

    <br>
    <button onclick="logout()">Logout</button>

    <script>
        async function validateAccess() {
            const token = localStorage.getItem('userToken'); 
            const conteudoDiv = document.getElementById('conteudo');

            if (!token) {
                window.location.href = "login.html";
                return;
            }

            try {
                const response = await fetch("https://2h1wm5fwje.execute-api.us-east-1.amazonaws.com/production/meu-perfil", {
                    method: 'GET',
                    headers: { 
                        'Authorization': token, 
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const result = await response.json();

                    const htmlProtegido = `
                        <h3>Your Private Data</h3>
                        <p>Only you and I know that this came from the Lambda: ${result.message}</p>
                    `;
                                        
                    document.getElementById('app-container').innerHTML = htmlProtegido;

                } else {
                    conteudoDiv.innerHTML = "<p style='color: red;'>❌ Invalid or expired session.</p>";
                    localStorage.removeItem('userToken');
                    setTimeout(() => { window.location.href = "login.html"; }, 2000);
                }
            } catch (err) {
                conteudoDiv.innerText = "❌ API connection error.";
            }
        }

        function logout() {
            localStorage.removeItem('userToken');
            window.location.href = "login.html";
        }

        // Runs validation right after page load
        window.onload = validateAccess;
    </script>
</body>
</html>
