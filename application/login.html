<h2>Login - Informática Solidária</h2>
<input type="email" id="login_email" placeholder="E-mail">
<input type="password" id="login_password" placeholder="Senha">
<button onclick="fazerLogin()">Entrar</button>

<script>
    async function fazerLogin() {
        const email = document.getElementById('login_email').value;
        const password = document.getElementById('login_password').value;
        const API_URL = "SUA_URL_DA_API/login"; 

        const response = await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({ email, password })
        });

        const result = await response.json();
        
        if (response.ok) {
  
            localStorage.setItem('userToken', result.token);
            alert("Login realizado com sucesso! Token salvo.");

        } else {
            alert("Erro no login: " + result.error);
        }
    }
</script>
